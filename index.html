<!DOCTYPE html>

<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Maia">
  <title>Maia</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body,#root{height:100%}
    body{background:#fdf8f3;font-family:'Jost',sans-serif;overscroll-behavior:none}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#edddd0;border-radius:2px}
    input,select,textarea,button{font-family:'Jost',sans-serif}
    .mhero{
      position:relative;overflow:hidden;padding:52px 20px 28px;
      border-radius:0 0 28px 28px;
      background:linear-gradient(160deg,#c9d8c0 0%,#a8c5b5 25%,#8fb5c8 50%,#c4b8a0 75%,#d8cdb0 100%);
    }
    .mhero::before{
      content:'';position:absolute;inset:0;pointer-events:none;
      background:
        radial-gradient(ellipse 55% 45% at 15% 25%,rgba(255,248,220,0.5) 0%,transparent 65%),
        radial-gradient(ellipse 45% 55% at 80% 15%,rgba(175,210,225,0.55) 0%,transparent 60%),
        radial-gradient(ellipse 50% 40% at 55% 85%,rgba(155,195,165,0.45) 0%,transparent 55%),
        radial-gradient(ellipse 35% 35% at 90% 70%,rgba(215,195,155,0.4) 0%,transparent 50%);
    }
    .mhero::after{
      content:'';position:absolute;inset:0;pointer-events:none;
      background:rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">

const { useState, useEffect, useCallback, useRef } = React;

// ── Palette ─────────────────────────────────────────────────────────────────
const C = {
cream:”#fdf8f3”, parchment:”#f5ede0”, blush:”#f0d4c8”, rose:”#e8b4a0”,
roseDark:”#c4836a”, berry:”#8b3a5e”, berryLight:”#f5e6ed”, mauve:”#d4a5b5”,
sage:”#b8c4b1”, sageDark:”#7a9470”, sageLight:”#edf2eb”,
charcoal:”#2c2420”, warm:”#6b5548”, muted:”#a89080”, cardBg:”#fffcf8”, border:”#edddd0”
};

// ── Helpers ──────────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2,“0”);
const todayKey = () => new Date().toISOString().slice(0,10);
const DAY_NO = [“Søndag”,“Mandag”,“Tirsdag”,“Onsdag”,“Torsdag”,“Fredag”,“Lørdag”];
const MON_NO = [“januar”,“februar”,“mars”,“april”,“mai”,“juni”,“juli”,“august”,“september”,“oktober”,“november”,“desember”];
const MON_S  = [“jan”,“feb”,“mar”,“apr”,“mai”,“jun”,“jul”,“aug”,“sep”,“okt”,“nov”,“des”];

function getGreeting() {
const h = new Date().getHours();
if (h >= 5  && h < 11) return “God morgen”;
if (h >= 11 && h < 13) return “God formiddag”;
if (h >= 13 && h < 17) return “God ettermiddag”;
if (h >= 17 && h < 21) return “God kveld”;
return “God natt”;
}

function getWeekNumber(d) {
const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
const ys = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
return Math.ceil((((date - ys) / 86400000) + 1) / 7);
}

function useStore(key, initial) {
const [val, setVal] = useState(() => {
try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : initial; }
catch { return initial; }
});
const save = useCallback(v => {
setVal(v);
try { localStorage.setItem(key, JSON.stringify(v)); } catch {}
}, [key]);
return [val, save];
}

// ── Clock + profile photo ────────────────────────────────────────────────────
function Clock({ photo, onPhoto }) {
const [time, setTime] = useState(new Date());
const fileRef = useRef();
useEffect(() => {
const t = setInterval(() => setTime(new Date()), 1000);
return () => clearInterval(t);
}, []);
return (
<div style={{ display:“flex”, alignItems:“flex-start”, gap:14, position:“relative”, zIndex:1 }}>
<div
onClick={() => fileRef.current.click()}
style={{ width:56, height:56, borderRadius:“50%”, border:“2px solid rgba(255,255,255,0.7)”,
overflow:“hidden”, flexShrink:0, cursor:“pointer”, background:“rgba(255,255,255,0.25)”,
display:“flex”, alignItems:“center”, justifyContent:“center” }}>
{photo
? <img src={photo} style={{ width:“100%”, height:“100%”, objectFit:“cover” }} />
: <span style={{ fontSize:22, opacity:0.7 }}>👤</span>}
<input ref={fileRef} type=“file” accept=“image/*” style={{ display:“none” }}
onChange={e => {
const f = e.target.files[0];
if (!f) return;
const r = new FileReader();
r.onload = ev => onPhoto(ev.target.result);
r.readAsDataURL(f);
}} />
</div>
<div>
<div style={{ fontFamily:”‘Cormorant Garamond’,serif”, fontSize:64, fontWeight:300,
letterSpacing:-2, color:”#fff”, lineHeight:1, textShadow:“0 2px 14px rgba(0,0,0,0.18)” }}>
{pad(time.getHours())}:{pad(time.getMinutes())}
<span style={{ fontSize:28, opacity:0.45, marginLeft:5 }}>{pad(time.getSeconds())}</span>
</div>
<div style={{ fontSize:11, color:“rgba(255,255,255,0.75)”, marginTop:5,
letterSpacing:1.5, textTransform:“uppercase”, fontWeight:300 }}>
{DAY_NO[time.getDay()]} · {time.getDate()}. {MON_NO[time.getMonth()]} {time.getFullYear()}
</div>
</div>
</div>
);
}

// ── Water drops ──────────────────────────────────────────────────────────────
function WaterDrop({ filled, onClick }) {
const id = filled ? “dFill” : “dEmpty”;
return (
<svg onClick={onClick} width=“26” height=“32” viewBox=“0 0 28 34”
style={{ cursor:“pointer”, transition:“transform 0.15s”, flexShrink:0 }}>
<defs>
<linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
<stop offset=“0%” stopColor={filled ? “#7ec8e3” : “#edddd0”} />
<stop offset=“100%” stopColor={filled ? “#4a9fc4” : “#d9c4b5”} />
</linearGradient>
</defs>
<path d=“M14 2 C14 2 4 14 4 21 a10 10 0 0 0 20 0 C24 14 14 2 14 2Z”
fill={“url(#” + id + “)”} stroke={filled ? “#4a9fc4” : “#d9c4b5”} strokeWidth=“0.5” />
{filled && <ellipse cx="10" cy="19" rx="2.5" ry="4" fill="rgba(255,255,255,0.25)" />}
</svg>
);
}

function WaterMini({ data, onChange }) {
const glasses = data[todayKey()] || 0;
const goal = 7;
const add = () => onChange({ …data, [todayKey()]: Math.min(goal + 2, glasses + 1) });
const rem = () => onChange({ …data, [todayKey()]: Math.max(0, glasses - 1) });
return (
<div>
<div style={{ display:“flex”, justifyContent:“space-between”, marginBottom:8 }}>
<span style={{ fontSize:10, color:C.muted, textTransform:“uppercase”, letterSpacing:1.2, fontWeight:500 }}>Vann</span>
<span style={{ fontSize:11, color:C.warm }}>{glasses * 300}ml / 2100ml</span>
</div>
<div style={{ display:“flex”, gap:3, flexWrap:“wrap”, justifyContent:“center” }}>
{Array.from({ length: goal }).map((_, i) => (
<WaterDrop key={i} filled={i < glasses} onClick={i < glasses ? rem : add} />
))}
</div>
<div style={{ fontSize:9, color: glasses >= goal ? C.sageDark : C.muted, textAlign:“center”, marginTop:5 }}>
{glasses >= goal ? “✓ Dagsmål nådd” : (goal - glasses) + “ glass igjen”}
</div>
</div>
);
}

// ── PCOS glass ───────────────────────────────────────────────────────────────
function PCOSGlass({ done, onClick, label }) {
return (
<div onClick={onClick}
style={{ transition:“transform 0.15s”, cursor:“pointer”, display:“flex”,
flexDirection:“column”, alignItems:“center”, gap:4 }}>
<svg width="34" height="46" viewBox="0 0 36 48">
<defs>
<linearGradient id={“gl” + (done ? “1” : “0”)} x1=“0” y1=“0” x2=“0” y2=“1”>
<stop offset=“0%” stopColor={done ? “#c4527a” : “#f0c8d8”} />
<stop offset=“100%” stopColor={done ? “#8b3a5e” : “#e8b4c4”} />
</linearGradient>
</defs>
<path d=“M7 6 L4 44 Q4 46 6 46 L30 46 Q32 46 32 44 L29 6 Z”
fill={“url(#gl” + (done ? “1” : “0”) + “)”}
stroke={done ? “#8b3a5e” : “#e0b0c0”} strokeWidth=“1.2” />
{done && <ellipse cx="14" cy="20" rx="4" ry="8" fill="rgba(255,255,255,0.18)" />}
<rect x=“5” y=“5” width=“26” height=“4” rx=“2” fill={done ? “#c4527a” : “#f0c8d8”} />
<rect x=“22” y=”-2” width=“3.5” height=“34” rx=“1.5” transform=“rotate(8,22,0)”
fill={done ? “#f9a8c4” : “#f5d0e0”} stroke={done ? “#e07090” : “#e8b8cc”} strokeWidth=“0.5” />
{done && <text x="18" y="40" textAnchor="middle" fontSize="10" fill="rgba(255,255,255,0.9)">✓</text>}
</svg>
<span style={{ fontSize:10, color: done ? C.berry : C.muted, fontWeight:500, textAlign:“center” }}>{label}</span>
</div>
);
}

function FishOilCapsule({ done }) {
return (
<svg width="42" height="20" viewBox="0 0 44 22">
<defs>
<linearGradient id={“cp” + (done ? “1” : “0”)} x1=“0” y1=“0” x2=“1” y2=“0”>
<stop offset=“0%”   stopColor={done ? “#e8a050” : “#f0d8b8”} />
<stop offset=“50%”  stopColor={done ? “#f0c060” : “#f8eccc”} />
<stop offset=“100%” stopColor={done ? “#d08030” : “#e8c8a0”} />
</linearGradient>
</defs>
<ellipse cx=“22” cy=“11” rx=“20” ry=“9”
fill={“url(#cp” + (done ? “1” : “0”) + “)”}
stroke={done ? “#c07020” : “#d8b888”} strokeWidth=“0.8” />
<ellipse cx="16" cy="8" rx="4" ry="3" fill="rgba(255,255,255,0.3)" />
{done && <text x="22" y="15" textAnchor="middle" fontSize="9" fill="rgba(255,255,255,0.85)">✓</text>}
</svg>
);
}

function SupplMini({ data, onChange, full }) {
const today = todayKey();
const day = new Date().getDay();
const log = data[today] || {};
const toggle = k => onChange({ …data, [today]: { …log, [k]: !log[k] } });
const isClove = day === 3 || day === 6;
return (
<div>
{full && <div style={{ fontSize:10, color:C.muted, textTransform:“uppercase”, letterSpacing:1.2, fontWeight:500, marginBottom:12 }}>Tilskudd i dag</div>}
<div style={{ display:“flex”, gap:10, justifyContent:“center”, marginBottom:12 }}>
<PCOSGlass done={!!log.pcos_m} onClick={() => toggle(“pcos_m”)} label=“Morgen” />
<PCOSGlass done={!!log.pcos_d} onClick={() => toggle(“pcos_d”)} label=“Middag” />
{isClove && (
<div onClick={() => toggle(“nellik”)}
style={{ cursor:“pointer”, display:“flex”, flexDirection:“column”, alignItems:“center”, gap:4, transition:“transform 0.15s” }}>
<div style={{ fontSize:26 }}>🌿</div>
<span style={{ fontSize:10, color: log.nellik ? C.sageDark : C.muted, fontWeight:500 }}>
{log.nellik ? “✓ Nellik” : “Nellik”}
</span>
</div>
)}
</div>
<div style={{ background:C.parchment, borderRadius:10, padding:“9px 12px” }}>
<div style={{ fontSize:10, color:C.muted, textTransform:“uppercase”, letterSpacing:1, fontWeight:500, marginBottom:6 }}>Tran · 3 kapsler</div>
<div style={{ display:“flex”, gap:8, justifyContent:“center” }}>
{[0,1,2].map(i => <FishOilCapsule key={i} done={i < (log.tran || 0)} />)}
</div>
<div style={{ display:“flex”, gap:6, justifyContent:“center”, marginTop:6 }}>
<button onClick={() => onChange({ …data, [today]: { …log, tran: Math.max(0,(log.tran||0)-1) } })}
style={{ width:26, height:26, borderRadius:7, border:“1px solid “+C.border, background:”#fff”, cursor:“pointer”, fontSize:13, color:C.warm }}>−</button>
<span style={{ fontSize:12, color:C.warm, lineHeight:“26px” }}>{log.tran || 0}/3</span>
<button onClick={() => onChange({ …data, [today]: { …log, tran: Math.min(3,(log.tran||0)+1) } })}
style={{ width:26, height:26, borderRadius:7, border:“1px solid “+C.border, background:”#fff”, cursor:“pointer”, fontSize:13, color:C.warm }}>+</button>
</div>
</div>
{!isClove && <div style={{ fontSize:9, color:C.blush, marginTop:5, textAlign:“center” }}>Nellik: onsdag og lørdag</div>}
</div>
);
}

// ── Sleep log ────────────────────────────────────────────────────────────────
function SleepLog({ data, onChange, settings, onSettings }) {
const today = todayKey();
const log = data[today] || {};
const [editing, setEditing] = useState(false);
const wakeH = settings.wakeHour != null ? settings.wakeHour : 6;
const wakeM = settings.wakeMin  != null ? settings.wakeMin  : 30;
const bedH = ((wakeH - 9 + 24) % 24);
const setLogTime = (field, val) => onChange({ …data, [today]: { …log, [field]: val } });
const days = Array.from({ length: 7 }, (_, i) => {
const d = new Date(); d.setDate(d.getDate() - (6 - i));
return d.toISOString().slice(0, 10);
});
return (
<div>
<div style={{ display:“flex”, justifyContent:“space-between”, marginBottom:8 }}>
<span style={{ fontSize:10, color:C.muted, textTransform:“uppercase”, letterSpacing:1, fontWeight:500 }}>Søvn · 9 timer</span>
<button onClick={() => setEditing(!editing)}
style={{ fontSize:11, color:C.roseDark, background:“none”, border:“none”, cursor:“pointer” }}>Endre mål</button>
</div>
{editing && (
<div style={{ display:“flex”, gap:6, alignItems:“center”, flexWrap:“wrap”, marginBottom:10, padding:“8px 10px”, background:C.parchment, borderRadius:10 }}>
<span style={{ fontSize:12, color:C.warm }}>Vekking:</span>
<input type=“number” min={0} max={23} value={wakeH}
onChange={e => onSettings({ …settings, wakeHour: parseInt(e.target.value) })}
style={{ width:42, padding:“4px 6px”, borderRadius:7, border:“1.5px solid “+C.border, fontSize:13, outline:“none”, background:C.cream }} />
<span>:</span>
<input type=“number” min={0} max={59} value={wakeM}
onChange={e => onSettings({ …settings, wakeMin: parseInt(e.target.value) })}
style={{ width:42, padding:“4px 6px”, borderRadius:7, border:“1.5px solid “+C.border, fontSize:13, outline:“none”, background:C.cream }} />
<button onClick={() => setEditing(false)}
style={{ padding:“4px 12px”, borderRadius:14, background:C.charcoal, color:”#fff”, border:“none”, cursor:“pointer”, fontSize:12 }}>OK</button>
</div>
)}
<div style={{ display:“flex”, gap:8, marginBottom:12 }}>
{[
{ label:“Mål vekking”,  val: pad(wakeH)+”:”+pad(wakeM), emoji:“🌅” },
{ label:“Mål leggetid”, val: pad(bedH)+”:”+pad(wakeM),  emoji:“🌙” }
].map(item => (
<div key={item.label} style={{ flex:1, padding:“8px 10px”, background:C.parchment, borderRadius:10, border:“1px solid “+C.border, textAlign:“center” }}>
<div style={{ fontSize:14, marginBottom:2 }}>{item.emoji}</div>
<div style={{ fontSize:9, color:C.muted, textTransform:“uppercase”, letterSpacing:0.7, marginBottom:2 }}>{item.label}</div>
<div style={{ fontFamily:”‘Cormorant Garamond’,serif”, fontSize:20, color:C.charcoal }}>{item.val}</div>
</div>
))}
</div>
<div style={{ display:“flex”, gap:8, marginBottom:10 }}>
{[
{ field:“sleptAt”, label:“Jeg la meg”,    emoji:“🌙” },
{ field:“wokeAt”,  label:“Jeg stod opp”,  emoji:“☀️” }
].map(f => (
<div key={f.field} style={{ flex:1, background:C.cream, borderRadius:10, border:“1px solid “+C.border, padding:“8px 10px”, textAlign:“center” }}>
<div style={{ fontSize:12, marginBottom:4 }}>{f.emoji}</div>
<div style={{ fontSize:9, color:C.muted, textTransform:“uppercase”, letterSpacing:0.7, marginBottom:6 }}>{f.label}</div>
<input type=“time” value={log[f.field] || “”}
onChange={e => setLogTime(f.field, e.target.value)}
style={{ width:“100%”, padding:“4px 6px”, borderRadius:7, border:“1.5px solid “+C.border, fontSize:13, background:”#fff”, outline:“none”, textAlign:“center” }} />
</div>
))}
</div>
<div style={{ display:“flex”, gap:3 }}>
{days.map(k => {
const d = data[k] || {};
const has = d.sleptAt || d.wokeAt;
const isT = k === today;
return (
<div key={k} style={{ flex:1, textAlign:“center”, padding:“4px 2px”, borderRadius:6, background: has ? C.berryLight : C.parchment, border:“1px solid “+(isT ? C.berry : C.border) }}>
<div style={{ fontSize:8, color:C.muted, textTransform:“uppercase” }}>{DAY_NO[new Date(k+“T12:00:00”).getDay()].slice(0,2)}</div>
<div style={{ fontSize:9, color: has ? C.berry : C.muted, fontWeight:500 }}>{d.wokeAt || “-”}</div>
</div>
);
})}
</div>
<div style={{ fontSize:9, color:C.muted, marginTop:6, textAlign:“center” }}>Husk å dusje før du legger deg 🛁</div>
</div>
);
}

// ── Skincare ─────────────────────────────────────────────────────────────────
function SkincareTracker({ data, onChange }) {
const today = todayKey();
const day = new Date().getDay();
const week = getWeekNumber(new Date());
const even = week % 2 === 0;
const log = data[today] || {};
const toggleItem = (k, val) => {
const cur = log[k];
if (cur === val) onChange({ …data, [today]: { …log, [k]: null } });
else onChange({ …data, [today]: { …log, [k]: val } });
};
const azelaicDays = even ? [1,3,5,0] : [2,4,6];
const retinalDays  = even ? [2,4,6]   : [1,3,5,0];
const showAzelaic = azelaicDays.includes(day);
const showRetinal  = retinalDays.includes(day);
const ITEMS = [
{ key:“solkrem”,      label:“Solkrem”,               time:“morgen”, emoji:“☀️” },
…(showAzelaic ? [{ key:“azelaic”,      label:“Azelaic acid (ansikt)”, time:“kveld”,  emoji:“🧴” }] : []),
…(showRetinal  ? [{ key:“retinal”,      label:“Retinal (ansikt)”,      time:“kveld”,  emoji:“✨” }] : []),
…(showRetinal  ? [{ key:“retinal_body”, label:“Retinal (hyperpigm.)”,  time:“kveld”,  emoji:“🩹” }] : []),
{ key:“spotcream”,    label:“Spotcream”,              time:“kveld”,  emoji:“💧” },
];
const statDays = Array.from({ length: 7 }, (_, i) => {
const d = new Date(); d.setDate(d.getDate() - (6 - i));
return d.toISOString().slice(0, 10);
});
return (
<div>
<div style={{ display:“flex”, flexDirection:“column”, gap:5, marginBottom:12 }}>
{ITEMS.map(item => {
const val = log[item.key];
const done = val === “done”, skipped = val === “skipped”;
return (
<div key={item.key} style={{ padding:“7px 10px”, borderRadius:10,
background: done ? C.sageLight : skipped ? “#f5f5f0” : C.cream,
border:“1px solid “ + (done ? C.sage : skipped ? “#d0ccc0” : C.border),
display:“flex”, alignItems:“center”, gap:8 }}>
<span style={{ fontSize:14 }}>{item.emoji}</span>
<div style={{ flex:1 }}>
<div style={{ fontSize:12, color: done ? C.sageDark : skipped ? C.muted : C.charcoal }}>{item.label}</div>
<div style={{ fontSize:9, color:C.muted, textTransform:“uppercase”, letterSpacing:0.5 }}>{item.time}</div>
</div>
<div style={{ display:“flex”, gap:4 }}>
<button onClick={() => toggleItem(item.key,“done”)}
style={{ padding:“3px 8px”, borderRadius:10, fontSize:10,
background: done ? C.sageDark : “#fff”, color: done ? “#fff” : C.warm,
border:“1px solid “+(done ? C.sageDark : C.border), cursor:“pointer” }}>✓</button>
<button onClick={() => toggleItem(item.key,“skipped”)}
style={{ padding:“3px 8px”, borderRadius:10, fontSize:10,
background: skipped ? “#999” : “#fff”, color: skipped ? “#fff” : C.muted,
border:“1px solid “+(skipped ? “#999” : C.border), cursor:“pointer” }}>Hoppet over</button>
</div>
</div>
);
})}
</div>
<div style={{ fontSize:10, color:C.muted, marginBottom:6, fontWeight:500 }}>Siste 7 dager — solkrem</div>
<div style={{ display:“flex”, gap:3 }}>
{statDays.map(k => {
const d = data[k] || {};
const done = d.solkrem === “done”, skip = d.solkrem === “skipped”;
const isT = k === today;
return (
<div key={k} style={{ flex:1, textAlign:“center”, padding:“3px 1px”, borderRadius:5,
background: done ? C.sageLight : skip ? “#f5f5f0” : C.parchment,
border:“1px solid “+(isT ? C.berry : C.border) }}>
<div style={{ fontSize:8, color:C.muted, textTransform:“uppercase” }}>{DAY_NO[new Date(k+“T12:00:00”).getDay()].slice(0,2)}</div>
<div style={{ fontSize:10 }}>{done ? “✓” : skip ? “–” : “·”}</div>
</div>
);
})}
</div>
{!showAzelaic && !showRetinal && (

function TodaySchedule({ events }) {

const now = new Date(), nowM = now.getHours()*60 + now.getMinutes();
const TAG = { personal:C.rose, study:”#d4a060”, health:C.sage };

{todayEvs.map(ev => {

return (

</div>
);
})}
</div>
);
}

// ── Alert panel ──────────────────────────────────────────────────────────────
function AlertPanel({ events, supplements, water }) {
const today = todayKey(), d = new Date(), day = d.getDay(), alerts = [];
const sl = supplements[today] || {};
if (!sl.pcos_m && d.getHours() >= 7)  alerts.push({ msg:“Ta PCOS-pulver (morgen)”, urgent:true });
if (!sl.pcos_d && d.getHours() >= 12) alerts.push({ msg:“Ta PCOS-pulver (middag)”, urgent:true });
if ((day === 3 || day === 6) && !sl.nellik) alerts.push({ msg:“Nellik-dag”, urgent: d.getHours() >= 10 });
if ((sl.tran||0) < 3 && d.getHours() >= 18) alerts.push({ msg:“Tran: “+(3-(sl.tran||0))+” igjen”, urgent:false });
const g = water[today] || 0;
if (g < 7 && d.getHours() >= 18) alerts.push({ msg:(7-g)+” glass vann igjen”, urgent:true });
for (let i = 0; i <= 7; i++) {
const dd = new Date(d); dd.setDate(d.getDate()+i);
const k = dd.toISOString().slice(0,10);
events.filter(e => e.date === k).forEach(ev => {
const lbl = i===0 ? “i dag” : i===1 ? “i morgen” : DAY_NO[dd.getDay()].toLowerCase()+” “+dd.getDate()+”.”;
alerts.push({ msg:(ev.important?“⚠️ “:””)+ev.title+” — “+lbl+(ev.time?” kl.”+ev.time:””), urgent:i===0||ev.important });
});
}
if (!alerts.length) return <div style={{ fontSize:11, color:C.blush, textAlign:“center”, padding:“8px 0” }}>Alt ser bra ut ✨</div>;
return (
<div style={{ display:“flex”, flexDirection:“column”, gap:4 }}>
{alerts.slice(0,7).map((a,i) => (
<div key={i} style={{ padding:“4px 9px”, borderRadius:7, fontSize:11,
background: a.urgent ? “#fff5f0” : C.cream, border:“1px solid “+(a.urgent ? C.blush : C.border),
color: a.urgent ? C.berry : C.warm }}>
{a.urgent ? “· “ : “○ “}{a.msg}
</div>
))}
</div>
);
}

// ── Todo list ────────────────────────────────────────────────────────────────
function TodoList({ todos, onChange, accent }) {
accent = accent || C.roseDark;
const [newText, setNewText] = useState(””);
const [newFreq, setNewFreq] = useState(“none”);
const today = todayKey(), day = new Date().getDay();
const isVisible = t => {
if (t.freq === “none”) return true;
if (t.freq === “daily”) return true;
if (t.freq === “weekly”) return true;
if (t.freq === “biweekly”) { const wk = getWeekNumber(new Date()); return wk%2 === (t.bws||0)%2; }
if (t.freq === “weekly-wed-sat”) return day===3 || day===6;
return true;
};
const isDone = t => (t.doneOn || []).includes(today);
const toggle = id => onChange(todos.map(t => {
if (t.id !== id) return t;
const done = t.doneOn || [];
return isDone(t) ? { …t, doneOn: done.filter(d => d !== today) } : { …t, doneOn: […done, today] };
}));
const del = id => onChange(todos.filter(t => t.id !== id));
const add = () => {
if (!newText.trim()) return;
onChange([…todos, { id:Date.now(), text:newText.trim(), freq:newFreq, doneOn:[], bws:getWeekNumber(new Date()) }]);
setNewText(””); setNewFreq(“none”);

const freqLabel = f => ({ none:“Én gang”, daily:“Daglig”, weekly:“Ukentlig”, biweekly:“Annenhver dag”, “weekly-wed-sat”:“Ons/lør” }[f] || f);

// ── Training ─────────────────────────────────────────────────────────────────
function TrainingPlan({ data, onChange }) {
const today = todayKey(), d = new Date(), day = d.getDay();
const strengthDays = data.strengthDays || [1,3,5];
const overrides = data.overrides || {};
const log = data.log || {};
const todayDone = log[today] || {};
const weekStart = new Date(d); weekStart.setDate(d.getDate() - ((d.getDay()+6)%7));
const weekKey = weekStart.toISOString().slice(0,10);
const weekOv = overrides[weekKey] || {};
const effectiveDays = strengthDays.map(sd => weekOv[sd] != null ? weekOv[sd] : sd);
const isStrengthDay = effectiveDays.includes(day);
const DS = [“Søn”,“Man”,“Tir”,“Ons”,“Tor”,“Fre”,“Lør”];
const toggleW = type => onChange({ …data, log: { …log, [today]: { …todayDone, [type]: !todayDone[type] } } });
const pushDay = origDay => {
const cur = weekOv[origDay] != null ? weekOv[origDay] : origDay;
const next = cur >= 6 ? 0 : cur + 1;
onChange({ …data, overrides: { …overrides, [weekKey]: { …weekOv, [origDay]: next } } });
};
return (
<div>
<div style={{ fontSize:10, color:C.muted, textTransform:“uppercase”, letterSpacing:1, fontWeight:500, marginBottom:6 }}>Styrkedager</div>
<div style={{ display:“flex”, gap:3, marginBottom:12 }}>

const isOrig = strengthDays.includes(i), isEff = effectiveDays.includes(i), isT = i===day;
return (
<div key={i}
onClick={() => { const cur = strengthDays.includes(i) ? strengthDays.filter(d=>d!==i) : […strengthDays,i]; onChange({ …data, strengthDays:cur }); }}
style={{ flex:1, height:28, borderRadius:7, display:“flex”, alignItems:“center”, justifyContent:“center”,
cursor:“pointer”, fontSize:9, fontWeight:500,
background: isEff ? C.roseDark : isOrig ? “#e8c0b0” : C.parchment,
color: isEff ? “#fff” : C.muted,
border: isT ? “2px solid “+C.berry : “2px solid transparent”, transition:“all 0.2s” }}>
{label}
</div>
);
})}
</div>
<div style={{ display:“flex”, gap:8, marginBottom:10 }}>
{isStrengthDay && (
<div onClick={() => toggleW(“strength”)}
style={{ flex:1, padding:“10px 8px”, borderRadius:11, cursor:“pointer”, textAlign:“center”,
background: todayDone.strength ? C.sageLight : C.cream,

<div style={{ fontSize:20, marginBottom:3 }}>🏋️</div>
<div style={{ fontSize:12, fontWeight:500, color: todayDone.strength ? C.sageDark : C.warm }}>Styrke</div>
<div style={{ fontSize:10, color:C.muted }}>{todayDone.strength ? “✓ Ferdig” : “Ikke gjort”}</div>

)}
<div onClick={() => toggleW(“walk”)}

// ── Cleaning rotation ────────────────────────────────────────────────────────
function CleaningRotation({ data, onChange }) {
const tasks = data.tasks || [“Bad”,“Kjøkken”,“Gulv”,“Andre oppgaver”];
const week = getWeekNumber(new Date());
const startWeek = data.startWeek || 0;
const idx = ((week - 1 - startWeek + 400) % tasks.length + tasks.length) % tasks.length;
const current = tasks[idx];
const log = data.log || {}, today = todayKey(), done = log[today] === current;
const [editing, setEditing] = useState(false);
const [editTasks, setEditTasks] = useState(tasks.join(”\n”));
const [editStart, setEditStart] = useState(String(startWeek));
const save = () => {
const t = editTasks.split(”\n”).map(s=>s.trim()).filter(Boolean);
onChange({ …data, tasks:t, startWeek: parseInt(editStart)||0 });
setEditing(false);
};
return (
<div>

background: done ? C.sageLight : C.parchment, border:“1.5px solid “+(done ? C.sage : C.border), transition:“all 0.2s” }}>
<span style={{ fontSize:18 }}>🧹</span>
<div>
<div style={{ fontSize:13, fontWeight:500, color: done ? C.sageDark : C.charcoal }}>Denne uka: {current}</div>
<div style={{ fontSize:10, color:C.muted }}>{done ? “✓ Ferdig” : “Trykk for å markere”}</div>
</div>
</div>
<div style={{ display:“flex”, gap:3, marginTop:6 }}>
{tasks.map((t,i) => (
<div key={i} style={{ flex:1, padding:“3px 1px”, textAlign:“center”, borderRadius:5, fontSize:9,
background: i===idx ? C.roseDark : C.parchment, color: i===idx ? “#fff” : C.muted }}>
{t.split(” “)[0]}
</div>
))}
</div>
</div>

// ── Study timer ──────────────────────────────────────────────────────────────
function StudyTimer({ data, onChange }) {
const [running, setRunning] = useState(false);
const [elapsed, setElapsed] = useState(0);
const [started, setStarted] = useState(false);
const timerRef = useRef(null);
const today = todayKey();
const sessions = data[today] || [];
const totalToday = sessions.reduce((s,x) => s+x.dur, 0);
const fmt = s => { const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60; return h>0 ? h+“t “+pad(m)+“m” : m>0 ? pad(m)+“m “+pad(sec)+“s” : pad(sec)+“s”; };
useEffect(() => {
if (running) timerRef.current = setInterval(() => setElapsed(e => e+1), 1000);
else clearInterval(timerRef.current);
return () => clearInterval(timerRef.current);
}, [running]);
const start = () => { setStarted(true); setRunning(true); };
const stop = () => {
setRunning(false);
if (elapsed > 0) {
const ns = […sessions, { id:Date.now(), dur:elapsed, ts:new Date().toLocaleTimeString(“no-NO”) }];
onChange({ …data, [today]:ns });
}
setElapsed(0); setStarted(false);
};
const weekDays = Array.from({ length:7 }, (_,i) => { const d=new Date(); d.setDate(d.getDate()-i); return d.toISOString().slice(0,10); }).reverse();
const maxDur = Math.max(…weekDays.map(k => (data[k]||[]).reduce((s,x)=>s+x.dur,0)), 1);
return (
<div>
<div style={{ textAlign:“center”, marginBottom:14 }}>
<div style={{ fontFamily:”‘Cormorant Garamond’,serif”, fontSize:44, fontWeight:300, color: running ? C.berry : C.charcoal, letterSpacing:-1 }}>{fmt(elapsed)}</div>
<div style={{ display:“flex”, gap:8, justifyContent:“center”, marginTop:8 }}>
{!started && <button onClick={start} style={{ padding:“7px 20px”, borderRadius:20, background:C.charcoal, color:”#fff”, border:“none”, cursor:“pointer”, fontSize:13 }}>Start</button>}
{started && running && <button onClick={() => setRunning(false)} style={{ padding:“7px 20px”, borderRadius:20, background:C.parchment, color:C.warm, border:“1px solid “+C.border, cursor:“pointer”, fontSize:13 }}>Pause</button>}
{started && !running && <button onClick={() => setRunning(true)} style={{ padding:“7px 20px”, borderRadius:20, background:C.charcoal, color:”#fff”, border:“none”, cursor:“pointer”, fontSize:13 }}>Fortsett</button>}
{started && <button onClick={stop} style={{ padding:“7px 20px”, borderRadius:20, background:C.roseDark, color:”#fff”, border:“none”, cursor:“pointer”, fontSize:13 }}>Stopp og logg</button>}
</div>
<div style={{ fontSize:12, color:C.muted, marginTop:6 }}>I dag: {fmt(totalToday)}</div>
</div>
<div style={{ fontSize:10, color:C.muted, textTransform:“uppercase”, letterSpacing:1, fontWeight:500, marginBottom:6 }}>Siste 7 dager</div>
<div style={{ display:“flex”, gap:3, alignItems:“flex-end”, height:40 }}>
{weekDays.map(k => {
const dur = (data[k]||[]).reduce((s,x)=>s+x.dur,0);
const h = dur > 0 ? Math.max(8, Math.round((dur/maxDur)*36)) : 4;
const isT = k === today;
return (
<div key={k} style={{ flex:1, display:“flex”, flexDirection:“column”, alignItems:“center”, gap:2 }}>
<div style={{ width:“100%”, height:h, background: isT ? C.berry : dur>0 ? C.rose : C.parchment, borderRadius:“3px 3px 0 0” }} />
<div style={{ fontSize:8, color:C.muted, textTransform:“uppercase” }}>{DAY_NO[new Date(k+“T12:00:00”).getDay()].slice(0,2)}</div>
</div>
);
})}
</div>
</div>
);
}

  </div>

  <div style={{ width:"100%", paddingBottom:90 }}>

    {/* ── HOME ── */}
    {page === "home" && (
      <div>
        <div className="mhero">
          <Clock photo={photo} onPhoto={setPhoto} />
          <div style={{ marginTop:14, fontFamily:"'Cormorant Garamond',serif", fontSize:28, fontWeight:300, color:"#fff", letterSpacing:0.3, position:"relative", zIndex:1, textShadow:"0 2px 10px rgba(0,0,0,0.2)" }}>
            {greeting}, Maia
          </div>
          <div style={{ fontSize:11, color:"rgba(255,255,255,0.65)", marginTop:2, letterSpacing:1.5, textTransform:"uppercase", fontWeight:300, position:"relative", zIndex:1 }}>
            Uke {getWeekNumber(d)} · {d.getDate()}. {MON_NO[d.getMonth()]}
          </div>
        </div>

        <div style={P}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            <Card title="Varsler" emoji="🔔"><AlertPanel events={events} supplements={supplements} water={water} /></Card>
            <Card title="Timeplan" emoji="📅"><TodaySchedule events={events} /></Card>
          </div>

          <Card title="Dagens gjøremål" emoji="✓">
            <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
              {allTodos.slice(0,7).map(t => {
                const done = (t.doneOn||[]).includes(today);
                return (
                  <div key={t.id} onClick={() => toggleTodo(t.id)}
                    style={{ display:"flex", alignItems:"center", gap:8, padding:"5px 9px", borderRadius:9,
                      background: done ? C.sageLight : C.cream, border:"1px solid "+(done?C.sage:C.border),
                      cursor:"pointer", transition:"all 0.2s" }}>
                    <div style={{ width:16, height:16, borderRadius:"50%",
                      border:"2px solid "+(done?C.sageDark:C.rose), background: done ? C.sageDark : "transparent",
                      display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, transition:"all 0.2s" }}>
                      {done && <span style={{ color:"white", fontSize:8 }}>✓</span>}
                    </div>
                    <span style={{ fontSize:12, color: done ? C.muted : C.charcoal, textDecoration: done ? "line-through" : "none", flex:1 }}>{t.text}</span>
                  </div>
                );
              })}
              {!allTodos.length && <div style={{ fontSize:12, color:C.muted, textAlign:"center", padding:"8px 0", fontStyle:"italic" }}>Alt er gjort for i dag ✨</div>}
            </div>
          </Card>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, alignItems:"start" }}>
            <Card title="Notiser" emoji="🖊"><QuickNotes notes={notes} onChange={setNotes} /></Card>
            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              <Card><WaterMini data={water} onChange={setWater} /></Card>
              <Card><SupplMini data={supplements} onChange={setSupplements} /></Card>
            </div>
          </div>
        </div>
      </div>
    )}

    {/* ── PERSONAL ── */}
    {page === "personal" && (
      <div style={P}>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:28, fontWeight:300, padding:"12px 2px 4px" }}>Personlig</div>
        <Card title="Daglige gjøremål" emoji="📋"><TodoList todos={pTodos} onChange={setPTodos} accent={C.roseDark} /></Card>
        <Card title="Rengjøringsrotasjon" emoji="🧹"><CleaningRotation data={cleaning} onChange={setCleaning} /></Card>
        <Card title="Måltider" emoji="🍽️"><MealTracker data={meals} onChange={setMeals} /></Card>
        <Card title="Søvn og rutiner" emoji="🌙"><SleepLog data={sleepLog} onChange={setSleepLog} settings={sleep} onSettings={setSleep} /></Card>
        {Object.keys(sleepLog).length > 0 && (
          <Card title="Søvnstatistikk" emoji="📊">
            <div style={{ display:"flex", gap:3 }}>
              {Array.from({length:7},(_,i)=>{ const dd=new Date(); dd.setDate(dd.getDate()-i); return dd.toISOString().slice(0,10); }).reverse().map(k => {
                const sl = sleepLog[k] || {}, isT = k===today;
                return (
                  <div key={k} style={{ flex:1, textAlign:"center", padding:"4px 2px", borderRadius:6, background: sl.wokeAt ? C.berryLight : C.parchment, border:"1px solid "+(isT ? C.berry : C.border) }}>
                    <div style={{ fontSize:8, color:C.muted, textTransform:"uppercase" }}>{DAY_NO[new Date(k+"T12:00:00").getDay()].slice(0,2)}</div>
                    <div style={{ fontSize:9, color: sl.wokeAt ? C.berry : C.muted, fontWeight:500, marginTop:2 }}>{sl.wokeAt || "-"}</div>
                    <div style={{ fontSize:8, color:C.muted }}>{sl.sleptAt || ""}</div>
                  </div>
                );
              })}
            </div>
          </Card>
        )}
      </div>
    )}

    {/* ── STUDY ── */}
    {page === "study" && (
      <div style={P}>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:28, fontWeight:300, padding:"12px 2px 4px" }}>Studie</div>
        <Card title="Studietimer" emoji="⏱️"><StudyTimer data={studyTimer} onChange={setStudyTimer} /></Card>
        <Card title="Gjøremål" emoji="📚"><TodoList todos={sTodos} onChange={setSTodos} accent="#c4a060" /></Card>
        <Card title="Viktige beskjeder" emoji="⚠️"><ImportantMessages events={events} /></Card>
        <Card title="Viktige datoer" emoji="📌">
          {!events.filter(e => e.tag==="study" && e.date>=todayKey()).length
            ? <div style={{ fontSize:12, color:C.muted, textAlign:"center", padding:"10px 0", fontStyle:"italic" }}>Ingen studiehendelser. Legg til via Kalender.</div>
            : events.filter(e => e.tag==="study" && e.date>=todayKey()).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,10).map(ev => (
              <div key={ev.id} style={{ display:"flex", gap:12, padding:"8px 0", borderBottom:"1px solid "+C.parchment, alignItems:"flex-start" }}>
                <div style={{ textAlign:"center", minWidth:36, background:C.parchment, borderRadius:7, padding:"3px 0" }}>
                  <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:18, color:C.charcoal, lineHeight:1 }}>{parseInt(ev.date.split("-")[2])}</div>
                  <div style={{ fontSize:8, color:C.muted, textTransform:"uppercase" }}>{MON_S[parseInt(ev.date.split("-")[1])-1]}</div>
                </div>
                <div>
                  <div style={{ fontSize:13, color: ev.important ? "#c07000" : C.charcoal }}>{ev.important ? "⚠ " : ""}{ev.title}</div>
                  {ev.time && <div style={{ fontSize:11, color:C.muted }}>kl. {ev.time}{ev.endTime ? " – "+ev.endTime : ""}</div>}
                  {ev.importantMsg && <div style={{ fontSize:11, color:"#c07000", fontStyle:"italic" }}>{ev.importantMsg}</div>}
                  {ev.note && <div style={{ fontSize:11, color:C.muted, fontStyle:"italic" }}>{ev.note}</div>}
                </div>
              </div>
            ))
          }
        </Card>
      </div>
    )}

    {/* ── HEALTH ── */}
    {page === "health" && (
      <div style={P}>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:28, fontWeight:300, padding:"12px 2px 4px" }}>Helse</div>
        <Card title="Tilskudd" emoji="✨"><SupplMini data={supplements} onChange={setSupplements} full={true} /></Card>
        <Card title="Hudpleie" emoji="🌿"><SkincareTracker data={skincare} onChange={setSkincare} /></Card>
        <Card title="Vann" emoji="💧"><WaterMini data={water} onChange={setWater} /></Card>
        <Card title="Skritt" emoji="🚶‍♀️"><StepTracker data={steps} onChange={setSteps} /></Card>
        <Card title="Trening" emoji="🏋️"><TrainingPlan data={training} onChange={setTraining} /></Card>
        <Card title="Måltider" emoji="🍽️"><MealTracker data={meals} onChange={setMeals} /></Card>
        <Card title="Menstruasjon" emoji="🌸"><MenstrualTracker data={menstrual} onChange={setMenstrual} /></Card>
      </div>
    )}

    {/* ── CALENDAR ── */}
    {page === "calendar" && (
      <div style={P}>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:28, fontWeight:300, padding:"12px 2px 4px" }}>Kalender</div>
        <Card><CalendarFull events={events} onEvents={setEvents} /></Card>
      </div>
    )}

  </div>
</div>
```

);
}

ReactDOM.createRoot(document.getElementById(“root”)).render(<App />);
</script>
